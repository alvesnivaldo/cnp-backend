<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Simulados</title>

<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: auto;
  padding: 30px;
  background: #f5f5f5;
}

.card {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}

label {
  display: block;
  padding: 6px;
  border-radius: 5px;
  margin-bottom: 5px;
}

button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  background: #3b63c6;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.correta { background: #4caf50; color: white; }
.errada { background: #f44336; color: white; }
</style>
</head>

<body>

<h2>📘 SIMULADOS</h2>

<div class="card">

<select id="seletor">
  <option value="prova1">Simulado 1</option>
</select>

<button onclick="carregar()">Carregar Simulado</button>

<hr>

<div id="conteudo"></div>

</div>

<script>
const simulados = {

  prova1: {
    texto: `
      <p>
      A educação tem sido, ao longo da história, um dos principais instrumentos de transformação social. Ela promove o pensamento crítico e a autonomia dos indivíduos.
      </p>
      <p>
      Apesar disso, ainda há desafios como desigualdade social e falta de recursos.
      </p>
      <p>
      Por isso, investir em educação é essencial para uma sociedade mais justa.
      </p>
    `,
    questoes: [
      {
        pergunta: "Objetivo do texto:",
        opcoes: ["Narrar","Criticar","Refletir sobre educação","Descrever tecnologia"],
        correta: 2
      },
      {
        pergunta: "Desafio citado:",
        opcoes: ["Excesso de recursos","Desigualdade social","Tecnologia","Facilidade"],
        correta: 1
      },
      {
        pergunta: "Educação é:",
        opcoes: ["Irrelevante","Transformadora","Inútil","Opcional"],
        correta: 1
      },
      {
        pergunta: "Solução sugerida:",
        opcoes: ["Ignorar","Investir em educação","Fechar escolas","Reduzir ensino"],
        correta: 1
      },
      {
        pergunta: "Ideia central:",
        opcoes: ["Educação melhora sociedade","Tecnologia domina","Nada muda","Crítica social"],
        correta: 0
      }
    ]
  }

};

let provaAtual = null;

function carregar() {
  const tipo = document.getElementById("seletor").value;
  provaAtual = simulados[tipo];

  let html = provaAtual.texto + "<hr>";

  provaAtual.questoes.forEach((q, i) => {
    html += `<p><b>${i+1}. ${q.pergunta}</b></p>`;

    q.opcoes.forEach((op, j) => {
      const letra = ["A","B","C","D"][j];

      html += `
        <label id="q${i}_${j}">
          <input type="radio" name="q${i}" value="${j}">
          ${letra}) ${op}
        </label>
      `;
    });
  });

  html += `
    <button onclick="corrigir()">Finalizar</button>
    <p id="resultado"></p>
  `;

  document.getElementById("conteudo").innerHTML = html;
}

function corrigir() {
  let acertos = 0;

  provaAtual.questoes.forEach((q, i) => {
    const marcada = document.querySelector(`input[name="q${i}"]:checked`);

    q.opcoes.forEach((_, j) => {
      document.getElementById(`q${i}_${j}`).classList.remove("correta","errada");
    });

    if (marcada) {
      const valor = Number(marcada.value);

      if (valor === q.correta) {
        acertos++;
        document.getElementById(`q${i}_${valor}`).classList.add("correta");
      } else {
        document.getElementById(`q${i}_${valor}`).classList.add("errada");
        document.getElementById(`q${i}_${q.correta}`).classList.add("correta");
      }
    }
  });

  document.getElementById("resultado").innerText =
    `Resultado: ${acertos} / ${provaAtual.questoes.length}`;
}
</script>

</body>
</html>
